<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/estilos2.css">
</head>
<body>
 
<div class="contenedor">
    <div class="contenido">
        <div class="formulario">
            
            
            <label>Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Usuario"> 

            <label>Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña">

            <button id="btnLogin" onclick="login()" class="btn">INICIAR SESION</button>

            <button id="btnRegistro" onclick="registrar()" class="btn">REGISTRARSE</button>

            <p id="mensaje"></p>
        </div>
    </div>
</div>

<script src="JavaScr/login_front.js"></script>
</body>
</html>
