<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABM Productos - Kiosco</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #d293e6;
            letter-spacing: 2px;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        .nav-links a {
            color: #d293e6;
            text-decoration: none;
            margin: 0 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .nav-links a:hover { border-color: #d293e6; }

        /* ── FORMULARIO ── */
        .form-card {
            background: #16213E;
            border: 1px solid #0F3460;
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 560px;
            margin: 0 auto 36px;
        }
        .form-card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #d293e6;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 14px;
        }
        .form-group label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        .form-group input {
            background: #0f1b35;
            border: 1px solid #0F3460;
            border-radius: 8px;
            padding: 9px 12px;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #d293e6; }

        .form-row {
            display: flex;
            gap: 14px;
        }
        .form-row .form-group { flex: 1; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-guardar  { background: linear-gradient(90deg, #9B59B6, #d293e6); color: #fff; }
        .btn-cancelar { background: #2a2a4a; color: #ccc; }

        #msg-form {
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
            font-size: 0.9rem;
        }
        .ok  { color: #4CAF50; }
        .err { color: #FF006E; }

        /* ── TABLA ── */
        .tabla-card {
            background: #16213E;
            border: 1px solid #0F3460;
            border-radius: 16px;
            padding: 24px;
            max-width: 960px;
            margin: 0 auto;
        }
        .tabla-card h2 {
            font-size: 1.2rem;
            color: #d293e6;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        thead tr {
            background: #0F3460;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #1a2a4a;
        }
        th { color: #d293e6; font-weight: 600; }
        td { color: #ddd; }
        tr:hover td { background: #1a2a4a; }

        .col-img { width: 60px; }
        .col-img img { width: 48px; height: 38px; object-fit: cover; border-radius: 6px; }

        .badge-stock {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .stock-ok  { background: #1a4a1a; color: #4CAF50; }
        .stock-off { background: #4a1a1a; color: #FF006E; }

        .acciones { white-space: nowrap; }
        .btn-edit, .btn-del {
            padding: 5px 12px;
            border: none;
            border-radius: 7px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
        }
        .btn-edit { background: #0F3460; color: #d293e6; }
        .btn-del  { background: #4a1a1a; color: #FF006E; }
        .btn-edit:hover { background: #1a4a7a; }
        .btn-del:hover  { background: #6a1a1a; }

        #sin-productos {
            text-align: center;
            color: #888;
            padding: 20px;
        }

        .search-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
        }
        .search-row input {
            background: #0f1b35;
            border: 1px solid #0F3460;
            border-radius: 8px;
            padding: 7px 12px;
            color: #eee;
            font-size: 0.9rem;
            outline: none;
            width: 220px;
        }
        .search-row input::placeholder { color: #555; }
    </style>
</head>
<body>

    <h1>🛒 ABM de Productos</h1>
    <div class="nav-links">
        <a href="/">← Volver al Login</a>
        <a href="/ventas">Ver Tienda</a>
    </div>

    <!-- FORMULARIO ALTA / MODIFICACIÓN -->
    <div class="form-card">
        <h2 id="titulo-form">➕ Agregar Producto</h2>

        <input type="hidden" id="prod-id">

        <div class="form-group">
            <label>Nombre del producto *</label>
            <input type="text" id="prod-nombre" placeholder="Ej: Alfajor Havanna">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Precio ($) *</label>
                <input type="number" id="prod-precio" placeholder="250" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label>Stock *</label>
                <input type="number" id="prod-stock" placeholder="10" min="0">
            </div>
        </div>

        <div class="form-group">
            <label>URL de imagen *</label>
            <input type="text" id="prod-imagen" placeholder="https://...">
        </div>

        <div class="btn-row">
            <button class="btn btn-guardar" onclick="guardarProducto()">💾 Guardar</button>
            <button class="btn btn-cancelar" id="btn-cancelar" onclick="cancelarEdicion()" style="display:none">✕ Cancelar</button>
        </div>
        <p id="msg-form"></p>
    </div>

    <!-- TABLA LISTADO -->
    <div class="tabla-card">
        <h2>📦 Productos en stock</h2>
        <div class="search-row">
            <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="filtrarTabla()">
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th class="col-img">Imagen</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="6" id="sin-productos">Cargando productos...</td></tr>
            </tbody>
        </table>
    </div>

<script>
    let todosLosProductos = [];

    // ── CARGAR PRODUCTOS ──────────────────────────────────────────────────────
    function cargarTabla() {
        fetch("/productos")
            .then(r => r.json())
            .then(data => {
                todosLosProductos = data;
                renderTabla(data);
            })
            .catch(() => mostrarMsg("Error al cargar productos", "err"));
    }

    function renderTabla(productos) {
        const tbody = document.getElementById("tabla-body");
        if (productos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" id="sin-productos">No hay productos cargados todavía.</td></tr>`;
            return;
        }
        tbody.innerHTML = productos.map(p => `
            <tr>
                <td>${p.id}</td>
                <td class="col-img"><img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/48x38?text=?'"></td>
                <td>${p.nombre}</td>
                <td>$${Number(p.precio).toFixed(2)}</td>
                <td>
                    <span class="badge-stock ${p.stock > 0 ? 'stock-ok' : 'stock-off'}">
                        ${p.stock > 0 ? p.stock + ' uds' : 'Agotado'}
                    </span>
                </td>
                <td class="acciones">
                    <button class="btn-edit" onclick="cargarEdicion(${p.id})">✏️ Editar</button>
                    <button class="btn-del"  onclick="eliminarProducto(${p.id}, '${p.nombre.replace(/'/g,"\\'")}')">🗑️ Eliminar</button>
                </td>
            </tr>
        `).join("");
    }

    function filtrarTabla() {
        const q = document.getElementById("buscador").value.toLowerCase();
        const filtrados = todosLosProductos.filter(p => p.nombre.toLowerCase().includes(q));
        renderTabla(filtrados);
    }

    // ── GUARDAR (ALTA o MODIFICACIÓN) ─────────────────────────────────────────
    function guardarProducto() {
        const id     = document.getElementById("prod-id").value;
        const nombre = document.getElementById("prod-nombre").value.trim();
        const precio = parseFloat(document.getElementById("prod-precio").value);
        const stock  = parseInt(document.getElementById("prod-stock").value);
        const imagen = document.getElementById("prod-imagen").value.trim();

        if (!nombre || isNaN(precio) || isNaN(stock) || !imagen) {
            return mostrarMsg("Por favor completá todos los campos.", "err");
        }
        if (precio < 0 || stock < 0) {
            return mostrarMsg("Precio y stock no pueden ser negativos.", "err");
        }

        const metodo = id ? "PUT" : "POST";
        const url    = id ? `/productos/${id}` : "/productos";

        fetch(url, {
            method: metodo,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, precio, imagen, stock })
        })
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data }) => {
            if (!ok) return mostrarMsg(data.error || "Error al guardar", "err");
            mostrarMsg(id ? "✅ Producto actualizado correctamente" : "✅ Producto agregado correctamente", "ok");
            limpiarForm();
            cargarTabla();
        })
        .catch(() => mostrarMsg("Error de conexión con el servidor", "err"));
    }

    // ── CARGAR DATOS PARA EDITAR ──────────────────────────────────────────────
    function cargarEdicion(id) {
        const prod = todosLosProductos.find(p => p.id === id);
        if (!prod) return;

        document.getElementById("prod-id").value     = prod.id;
        document.getElementById("prod-nombre").value = prod.nombre;
        document.getElementById("prod-precio").value = prod.precio;
        document.getElementById("prod-stock").value  = prod.stock;
        document.getElementById("prod-imagen").value = prod.imagen;

        document.getElementById("titulo-form").textContent = "✏️ Modificar Producto";
        document.getElementById("btn-cancelar").style.display = "";
        document.getElementById("msg-form").textContent = "";

        // Scroll al formulario
        document.querySelector(".form-card").scrollIntoView({ behavior: "smooth" });
    }

    function cancelarEdicion() {
        limpiarForm();
        mostrarMsg("", "");
    }

    function limpiarForm() {
        ["prod-id","prod-nombre","prod-precio","prod-stock","prod-imagen"].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById("titulo-form").textContent = "➕ Agregar Producto";
        document.getElementById("btn-cancelar").style.display = "none";
    }

    // ── ELIMINAR ──────────────────────────────────────────────────────────────
    function eliminarProducto(id, nombre) {
        if (!confirm(`¿Seguro que querés eliminar "${nombre}"?`)) return;

        fetch(`/productos/${id}`, { method: "DELETE" })
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data }) => {
            if (!ok) return mostrarMsg(data.error || "Error al eliminar", "err");
            mostrarMsg(`✅ "${nombre}" eliminado`, "ok");
            cargarTabla();
        })
        .catch(() => mostrarMsg("Error de conexión", "err"));
    }

    // ── HELPER MENSAJES ───────────────────────────────────────────────────────
    function mostrarMsg(texto, tipo) {
        const el = document.getElementById("msg-form");
        el.textContent = texto;
        el.className = tipo;
    }

    // ── INICIAR ───────────────────────────────────────────────────────────────
    cargarTabla();
</script>
</body>
</html>
